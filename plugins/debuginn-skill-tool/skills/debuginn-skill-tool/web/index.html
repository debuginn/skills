<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>debuginn-skill-tool — Skill Card Builder</title>
  <style>
    :root {
      --bg: #0d1117;
      --panel: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --accent: #58a6ff;
      --accent-dim: #1f3a5f;
      --tag-bg: #21262d;
      --tag-text: #79c0ff;
      --card-bg: #161b22;
      --card-border: #30363d;
      --card-path: #3fb950;
      --input-bg: #0d1117;
      --btn-primary: #238636;
      --btn-primary-hover: #2ea043;
      --btn-secondary: #21262d;
      --btn-secondary-hover: #30363d;
      --mono: "SF Mono", "Fira Code", "Cascadia Code", monospace;
      --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    }

    html[data-theme="light"] {
      --bg: #f6f8fa;
      --panel: #ffffff;
      --border: #d0d7de;
      --text: #24292f;
      --text-muted: #57606a;
      --accent: #0969da;
      --accent-dim: #ddf4ff;
      --tag-bg: #ddf4ff;
      --tag-text: #0550ae;
      --card-bg: #ffffff;
      --card-border: #d0d7de;
      --card-path: #1a7f37;
      --input-bg: #f6f8fa;
      --btn-primary: #1a7f37;
      --btn-primary-hover: #116329;
      --btn-secondary: #f6f8fa;
      --btn-secondary-hover: #eaeef2;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
      min-height: 100vh;
    }

    header {
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    header h1 {
      font-family: var(--mono);
      font-size: 14px;
      color: var(--text);
      font-weight: 600;
    }

    header h1 span { color: var(--card-path); }

    .theme-toggle {
      background: var(--btn-secondary);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 4px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-family: var(--mono);
    }

    .theme-toggle:hover { background: var(--btn-secondary-hover); }

    .app {
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 0;
      height: calc(100vh - 49px);
      overflow: hidden;
    }

    /* ── Panel ── */
    .panel {
      background: var(--panel);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .panel-section {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .section-title {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--card-path);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .field label {
      font-size: 12px;
      color: var(--text-muted);
      font-family: var(--mono);
    }

    .field input[type="text"],
    .field input[type="number"],
    .field textarea,
    .field select {
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 13px;
      font-family: var(--sans);
      padding: 7px 10px;
      width: 100%;
      outline: none;
      transition: border-color 0.15s;
    }

    .field input:focus,
    .field textarea:focus,
    .field select:focus {
      border-color: var(--accent);
    }

    .field textarea {
      resize: vertical;
      min-height: 64px;
      line-height: 1.5;
    }

    .field input[type="number"] { width: 80px; }

    .tool-type-btns {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 6px;
    }

    .tool-type-btn {
      background: var(--btn-secondary);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-muted);
      font-size: 11px;
      font-family: var(--mono);
      padding: 6px 4px;
      cursor: pointer;
      text-align: center;
      transition: all 0.15s;
    }

    .tool-type-btn:hover { border-color: var(--accent); color: var(--text); }

    .tool-type-btn.is-active {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--accent);
    }

    .tags-hint { font-size: 11px; color: var(--text-muted); }

    .btns {
      display: flex;
      gap: 8px;
      margin-top: 4px;
    }

    .btn {
      padding: 7px 16px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: background 0.15s;
    }

    .btn-primary {
      background: var(--btn-primary);
      color: #fff;
    }

    .btn-primary:hover { background: var(--btn-primary-hover); }

    .btn-secondary {
      background: var(--btn-secondary);
      border: 1px solid var(--border);
      color: var(--text);
    }

    .btn-secondary:hover { background: var(--btn-secondary-hover); }

    /* ── Preview area ── */
    .preview-area {
      display: grid;
      grid-template-rows: 1fr auto;
      overflow: hidden;
      background: var(--bg);
    }

    .card-viewport {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
      overflow: auto;
    }

    /* ── Skill Card ── */
    .skill-card {
      width: 320px;
      min-height: 380px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.3);
      transition: all 0.2s;
      position: relative;
    }

    .card-path {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--card-path);
    }

    .card-icon-area {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 80px;
    }

    .card-icon-placeholder {
      width: 64px;
      height: 64px;
      border-radius: 12px;
      background: var(--accent-dim);
      border: 1px dashed var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--accent);
      font-size: 24px;
    }

    .card-eyebrow {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-muted);
      text-align: center;
    }

    .card-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      text-align: center;
      line-height: 1.3;
    }

    .card-desc {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.6;
      text-align: center;
      flex: 1;
    }

    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: center;
    }

    .card-tag {
      background: var(--tag-bg);
      color: var(--tag-text);
      font-size: 11px;
      font-family: var(--mono);
      padding: 3px 8px;
      border-radius: 20px;
    }

    .card-cta {
      display: flex;
      gap: 8px;
    }

    .card-btn {
      flex: 1;
      background: var(--btn-secondary);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 12px;
      font-family: var(--mono);
      padding: 8px;
      text-align: center;
      cursor: default;
    }

    .card-btn-install {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--accent);
    }

    .card-install-badge {
      position: absolute;
      top: 12px;
      right: 12px;
      background: var(--accent-dim);
      border: 1px solid var(--accent);
      border-radius: 20px;
      font-size: 10px;
      font-family: var(--mono);
      color: var(--accent);
      padding: 2px 8px;
    }

    /* ── Output panel ── */
    .output-panel {
      background: var(--panel);
      border-top: 1px solid var(--border);
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-height: 280px;
    }

    .output-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .output-label {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--card-path);
    }

    .copy-btn {
      background: var(--btn-secondary);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 11px;
      font-family: var(--mono);
      padding: 4px 12px;
      cursor: pointer;
    }

    .copy-btn:hover { background: var(--btn-secondary-hover); }
    .copy-btn.copied { color: var(--card-path); border-color: var(--card-path); }

    .output-code {
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px;
      font-family: var(--mono);
      font-size: 12px;
      line-height: 1.6;
      color: var(--text);
      overflow: auto;
      max-height: 180px;
      white-space: pre;
      flex: 1;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>
  <header>
    <h1><span>$</span> debuginn-skill-tool — Skill Card Builder</h1>
    <button class="theme-toggle" id="themeToggle">☀ Light</button>
  </header>

  <div class="app">
    <!-- ── Left Panel ── -->
    <aside class="panel">

      <div class="panel-section">
        <div class="section-title"># basic info</div>

        <div class="field">
          <label>title *</label>
          <input type="text" id="titleInput" placeholder="My Awesome Tool" />
        </div>

        <div class="field">
          <label>slug * <span style="color:var(--text-muted);font-size:11px">(kebab-case, auto-derived from title)</span></label>
          <input type="text" id="slugInput" placeholder="my-awesome-tool" />
        </div>

        <div class="field">
          <label>desc</label>
          <textarea id="descInput" placeholder="1–2 sentences shown on the card."></textarea>
        </div>

        <div class="field">
          <label>eyebrow <span style="color:var(--text-muted);font-size:11px">(optional terminal label)</span></label>
          <input type="text" id="eyebrowInput" placeholder="# > Image Tools" />
        </div>
      </div>

      <div class="panel-section">
        <div class="section-title"># tool type</div>

        <div class="tool-type-btns">
          <button class="tool-type-btn is-active" data-type="">info-only</button>
          <button class="tool-type-btn" data-type="blog-cover">blog-cover</button>
          <button class="tool-type-btn" data-type="wx-xhs-poster">wx-xhs-poster</button>
        </div>
      </div>

      <div class="panel-section">
        <div class="section-title"># metadata</div>

        <div class="field">
          <label>tags <span style="color:var(--text-muted);font-size:11px">(comma-separated)</span></label>
          <input type="text" id="tagsInput" placeholder="Canvas API, PNG Export, Blog Cover" />
        </div>

        <div class="field">
          <label>weight <span style="color:var(--text-muted);font-size:11px">(sort order, lower = first)</span></label>
          <input type="number" id="weightInput" value="0" min="0" />
        </div>
      </div>

      <div class="panel-section">
        <div class="section-title"># install code (optional)</div>

        <div class="field">
          <textarea id="installInput" placeholder="/plugin marketplace add debuginn/skills&#10;/plugin install my-tool@debuginn-skills" style="min-height:80px;font-family:var(--mono);font-size:12px"></textarea>
        </div>
      </div>

      <div class="btns">
        <button class="btn btn-primary" id="copyFrontmatterBtn">复制 Front Matter</button>
        <button class="btn btn-secondary" id="resetBtn">重置</button>
      </div>

    </aside>

    <!-- ── Right Preview ── -->
    <div class="preview-area">
      <div class="card-viewport">
        <div class="skill-card" id="skillCard">
          <div class="card-path" id="cardPathEl">$ pwd: ~/tools/my-awesome-tool</div>

          <div class="card-icon-area">
            <div class="card-icon-placeholder">+</div>
          </div>

          <div class="card-eyebrow" id="cardEyebrowEl" style="display:none"></div>

          <div class="card-title" id="cardTitleEl">My Awesome Tool</div>

          <div class="card-desc" id="cardDescEl">Your description will appear here.</div>

          <div class="card-tags" id="cardTagsEl"></div>

          <div class="card-cta">
            <div class="card-btn">$ OpenTool</div>
            <div class="card-btn card-btn-install" id="cardInstallBtn" style="display:none">$ Install</div>
          </div>
        </div>
      </div>

      <div class="output-panel">
        <div class="output-header">
          <span class="output-label"># generated front matter</span>
          <button class="copy-btn" id="copyBtn">复制</button>
        </div>
        <pre class="output-code" id="outputCode"></pre>
      </div>
    </div>
  </div>

  <script>
    (function () {
      "use strict";

      // ── State ──────────────────────────────────────────────
      const state = {
        title: "",
        slug: "",
        desc: "",
        eyebrow: "",
        toolType: "",
        tags: "",
        weight: 0,
        installCode: "",
      };

      // ── Elements ───────────────────────────────────────────
      const titleInput    = document.getElementById("titleInput");
      const slugInput     = document.getElementById("slugInput");
      const descInput     = document.getElementById("descInput");
      const eyebrowInput  = document.getElementById("eyebrowInput");
      const tagsInput     = document.getElementById("tagsInput");
      const weightInput   = document.getElementById("weightInput");
      const installInput  = document.getElementById("installInput");
      const typeButtons   = document.querySelectorAll(".tool-type-btn");

      const cardPathEl    = document.getElementById("cardPathEl");
      const cardEyebrowEl = document.getElementById("cardEyebrowEl");
      const cardTitleEl   = document.getElementById("cardTitleEl");
      const cardDescEl    = document.getElementById("cardDescEl");
      const cardTagsEl    = document.getElementById("cardTagsEl");
      const cardInstallBtn= document.getElementById("cardInstallBtn");
      const outputCode    = document.getElementById("outputCode");
      const copyBtn       = document.getElementById("copyBtn");
      const copyFMBtn     = document.getElementById("copyFrontmatterBtn");
      const resetBtn      = document.getElementById("resetBtn");
      const themeToggle   = document.getElementById("themeToggle");

      // ── Utilities ──────────────────────────────────────────
      function toSlug(str) {
        return str
          .toLowerCase()
          .replace(/[\s_]+/g, "-")
          .replace(/[^\w-]/g, "")
          .replace(/--+/g, "-")
          .replace(/^-|-$/g, "");
      }

      function parseTags(raw) {
        return raw
          .split(",")
          .map(t => t.trim())
          .filter(Boolean);
      }

      function escapeYaml(str) {
        return str.replace(/"/g, '\\"');
      }

      // ── Generate front matter ──────────────────────────────
      function generateFrontMatter() {
        const slug     = state.slug || toSlug(state.title) || "my-tool";
        const tags     = parseTags(state.tags);
        const hasInstall = state.installCode.trim().length > 0;
        const hasToolType = state.toolType.trim().length > 0;

        let lines = ["---"];
        lines.push(`title: "${escapeYaml(state.title || "My Tool")}"`);
        lines.push(`slug: "${slug}"`);
        if (state.desc)    lines.push(`desc: "${escapeYaml(state.desc)}"`);
        if (hasToolType) {
          lines.push(`toolType: "${state.toolType}"`);
          lines.push(`toolCSS: "/css/${slug}.css"`);
          lines.push(`toolJS: "/js/${slug}.js"`);
        }
        if (state.eyebrow) lines.push(`eyebrow: "${escapeYaml(state.eyebrow)}"`);
        lines.push(`cardPath: "$ pwd: ~/tools/${slug}"`);
        if (hasInstall) {
          lines.push("installCode: |");
          state.installCode.split("\n").forEach(l => lines.push("  " + l));
        }
        if (tags.length > 0) {
          lines.push("tags:");
          tags.forEach(t => lines.push(`  - "${t}"`));
        }
        lines.push(`weight: ${state.weight}`);
        lines.push("---");
        lines.push("");
        lines.push(`<!-- Add your tool description here -->`);

        return lines.join("\n");
      }

      // ── Render card preview ────────────────────────────────
      function render() {
        const slug     = state.slug || toSlug(state.title) || "my-tool";
        const tags     = parseTags(state.tags);
        const hasInstall = state.installCode.trim().length > 0;

        // Card path
        cardPathEl.textContent = `$ pwd: ~/tools/${slug}`;

        // Eyebrow
        if (state.eyebrow) {
          cardEyebrowEl.textContent = state.eyebrow;
          cardEyebrowEl.style.display = "";
        } else {
          cardEyebrowEl.style.display = "none";
        }

        // Title
        cardTitleEl.textContent = state.title || "My Awesome Tool";

        // Desc
        cardDescEl.textContent = state.desc || "Your description will appear here.";

        // Tags
        cardTagsEl.innerHTML = "";
        tags.forEach(tag => {
          const el = document.createElement("span");
          el.className = "card-tag";
          el.textContent = tag;
          cardTagsEl.appendChild(el);
        });

        // Install badge
        cardInstallBtn.style.display = hasInstall ? "" : "none";

        // Output
        outputCode.textContent = generateFrontMatter();
      }

      // ── Event listeners ────────────────────────────────────
      titleInput.addEventListener("input", () => {
        state.title = titleInput.value;
        // Auto-derive slug only if slug hasn't been manually edited
        if (!slugInput.dataset.manual) {
          state.slug = toSlug(state.title);
          slugInput.value = state.slug;
        }
        render();
      });

      slugInput.addEventListener("input", () => {
        slugInput.dataset.manual = "1";
        state.slug = slugInput.value;
        render();
      });

      slugInput.addEventListener("blur", () => {
        // Normalize on blur
        state.slug = toSlug(slugInput.value) || toSlug(state.title);
        slugInput.value = state.slug;
        render();
      });

      descInput.addEventListener("input", () => {
        state.desc = descInput.value;
        render();
      });

      eyebrowInput.addEventListener("input", () => {
        state.eyebrow = eyebrowInput.value;
        render();
      });

      tagsInput.addEventListener("input", () => {
        state.tags = tagsInput.value;
        render();
      });

      weightInput.addEventListener("input", () => {
        state.weight = parseInt(weightInput.value, 10) || 0;
        render();
      });

      installInput.addEventListener("input", () => {
        state.installCode = installInput.value;
        render();
      });

      typeButtons.forEach(btn => {
        btn.addEventListener("click", () => {
          typeButtons.forEach(b => b.classList.remove("is-active"));
          btn.classList.add("is-active");
          state.toolType = btn.dataset.type;
          render();
        });
      });

      // ── Copy ───────────────────────────────────────────────
      function copyText(text, btn) {
        navigator.clipboard.writeText(text).then(() => {
          const orig = btn.textContent;
          btn.textContent = "✓ Copied";
          btn.classList.add("copied");
          setTimeout(() => {
            btn.textContent = orig;
            btn.classList.remove("copied");
          }, 1800);
        });
      }

      copyBtn.addEventListener("click", () => copyText(outputCode.textContent, copyBtn));
      copyFMBtn.addEventListener("click", () => copyText(outputCode.textContent, copyFMBtn));

      // ── Reset ──────────────────────────────────────────────
      resetBtn.addEventListener("click", () => {
        titleInput.value = "";
        slugInput.value = "";
        descInput.value = "";
        eyebrowInput.value = "";
        tagsInput.value = "";
        weightInput.value = "0";
        installInput.value = "";
        delete slugInput.dataset.manual;
        typeButtons.forEach(b => b.classList.remove("is-active"));
        typeButtons[0].classList.add("is-active");
        Object.assign(state, {
          title: "", slug: "", desc: "", eyebrow: "",
          toolType: "", tags: "", weight: 0, installCode: ""
        });
        render();
      });

      // ── Theme toggle ───────────────────────────────────────
      const saved = localStorage.getItem("debuginn_skill_tool_theme");
      if (saved === "light") {
        document.documentElement.setAttribute("data-theme", "light");
        themeToggle.textContent = "☾ Dark";
      }

      themeToggle.addEventListener("click", () => {
        const isLight = document.documentElement.getAttribute("data-theme") === "light";
        if (isLight) {
          document.documentElement.removeAttribute("data-theme");
          themeToggle.textContent = "☀ Light";
          localStorage.setItem("debuginn_skill_tool_theme", "dark");
        } else {
          document.documentElement.setAttribute("data-theme", "light");
          themeToggle.textContent = "☾ Dark";
          localStorage.setItem("debuginn_skill_tool_theme", "light");
        }
      });

      // ── Init ───────────────────────────────────────────────
      render();

    })();
  </script>
</body>
</html>

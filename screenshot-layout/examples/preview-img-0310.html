<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1080, initial-scale=1" />
  <title>Preview IMG_0310</title>
  <style>
    :root {
      --bg: #ffffff;
      --sub: #6e6e73;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      width: 1080px;
      height: 1080px;
      overflow: hidden;
      font-family: "SF Pro Display", "PingFang SC", "Helvetica Neue", Arial, sans-serif;
    }
    .canvas {
      position: relative;
      width: 1080px;
      height: 1080px;
      background: #fff;
    }
    .shot {
      position: absolute;
      left: 86px;
      top: 96px;
      width: 458px;
      height: 900px;
      object-fit: contain;
    }
    .copy {
      position: absolute;
      left: 612px;
      top: 438px;
    }
    .title {
      margin: 0;
      line-height: 1;
      font-size: 110px;
      font-weight: 700;
      background: linear-gradient(120deg, #4cc9f0 0%, #3a86ff 34%, #7b61ff 68%, #5eead4 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .subtitle {
      margin: 18px 0 0;
      line-height: 1.3;
      font-size: 24px;
      font-weight: 400;
      color: var(--sub);
      letter-spacing: 0.2px;
    }
  </style>
</head>
<body>
  <div class="canvas">
    <img class="shot" src="./IMG_0310_new.PNG" alt="iPhone screenshot" />
    <div class="copy">
      <h1 class="title">总览</h1>
      <p class="subtitle">清晰呈现你的资产全貌</p>
    </div>
  </div>
</body>
</html>
